name: 🐛 Bug report
description: Something isn't working as documented.
title: 'bug: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please **never paste real secret values** —
        use placeholders. For security issues, see our
        [Security Policy](https://github.com/hushenv/hushenv/security/policy)
        instead of this form.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands. Redact any secrets.
      placeholder: |
        1. hushenv init
        2. hushenv set DB_PASSWORD
        3. hushenv run -- ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: hushenv version
      description: Output of `hushenv --version`.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node -v`.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant error output. Redact secrets.
      render: shell

name: ✨ Feature request
description: Suggest an idea or improvement.
title: 'feat: '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like hushenv to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps `vault-core` engine-only (no `.env`/CLI concepts in the engine).
          required: false

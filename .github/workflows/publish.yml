# Release pipeline. Filename kept as publish.yml so the npm Trusted Publisher
# binding (org/repo + workflow filename) does not need to be reconfigured.
#
# Publishing is STAGED: CI never makes a version public on its own. It stages
# the tarballs; a maintainer reviews and approves them with 2FA, and only then
# are they installable. See docs/maintainers.md for the approval runbook.
#
# Flow:
#   1. A push to main with a pending changeset -> changesets/action opens (or
#      updates) the "Version Packages" PR. Nothing is staged.
#   2. Merging that PR bumps both package versions in lockstep and lands the
#      CHANGELOGs on main. The next push has no changesets, so the stage step
#      runs: it stages both packages to npm with provenance via OIDC Trusted
#      Publishing. Already-published or already-staged versions are skipped, so
#      re-runs are safe. The packages are NOT public yet.
#   3. A maintainer reviews (`npm stage list/view`) and approves with 2FA
#      (`npm stage approve <stage-id>`) for both packages - off-CI.
#   4. Re-run this workflow (Actions -> Run workflow / workflow_dispatch). Now
#      the versions are live on npm, so it creates the v<version> git tag and a
#      GitHub Release with the CycloneDX SBOM attached. Idempotent.
name: Publish Package

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # version PR commits, tags, GitHub Releases
      pull-requests: write # open/update the Version Packages PR
      id-token: write # npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Run tests
        run: pnpm -r test

      # Opens/updates the "Version Packages" PR when changesets are pending.
      # No `publish` input: the actual npm publish stays on the proven pnpm
      # pack path below so workspace:* is rewritten correctly.
      - name: Create or update the Version Packages PR
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Stage only after the Version PR has merged (no pending changesets).
      # During the run that merely opens the Version PR, changesets/action has
      # already bumped package.json in the working tree — staging here would
      # stage that version before the Version PR is merged.
      #
      # `npm stage publish` stages the current directory and does NOT accept a
      # tarball argument, so the old `pnpm pack` path (which rewrote workspace:*)
      # can't be reused. vault-core has no workspace deps and stages as-is;
      # hushenv's `@hushenv/vault-core: workspace:*` is rewritten to the concrete
      # version before staging and restored after. Both packages are version-
      # fixed (lockstep), so that version is the same $VERSION.
      - name: Stage @hushenv/vault-core
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: packages/vault-core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@hushenv/vault-core@$VERSION" version > /dev/null 2>&1; then
            echo "@hushenv/vault-core@$VERSION already published, skipping."
          elif npm stage list "@hushenv/vault-core" --json 2>/dev/null | grep -q "\"$VERSION\""; then
            echo "@hushenv/vault-core@$VERSION already staged, skipping."
          else
            npm stage publish --provenance --access public
          fi

      - name: Stage hushenv
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: apps/cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "hushenv@$VERSION" version > /dev/null 2>&1; then
            echo "hushenv@$VERSION already published, skipping."
          elif npm stage list "hushenv" --json 2>/dev/null | grep -q "\"$VERSION\""; then
            echo "hushenv@$VERSION already staged, skipping."
          else
            # Rewrite workspace:* -> concrete version so the staged tarball resolves.
            node -e "const f='./package.json',p=require(f);p.dependencies['@hushenv/vault-core']='$VERSION';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
            npm stage publish --provenance --access public
            git checkout -- package.json
          fi

      # Only fires once a version is actually live on npm — i.e. AFTER a
      # maintainer has approved the staged packages (2FA). It is skipped on the
      # staging run (the version isn't public yet) and runs on the post-approval
      # workflow_dispatch re-run: tags v<version> and cuts a GitHub Release with a
      # CycloneDX SBOM attached. Idempotent — the tag-existence check makes
      # re-runs no-ops.
      - name: Tag and release with SBOM
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./apps/cli/package.json').version")
          if git rev-parse "v$VERSION" > /dev/null 2>&1; then
            echo "v$VERSION already tagged; nothing to release."
            exit 0
          fi
          if ! npm view "hushenv@$VERSION" version > /dev/null 2>&1; then
            echo "hushenv@$VERSION is not on npm (no publish this run); skipping release."
            exit 0
          fi
          pnpm dlx @cyclonedx/cdxgen@^11 -t pnpm -r -o sbom.cdx.json \
            || echo "SBOM generation failed; continuing without it."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"
          NOTES="Published \`hushenv@$VERSION\` and \`@hushenv/vault-core@$VERSION\` to npm with provenance. See apps/cli/CHANGELOG.md and packages/vault-core/CHANGELOG.md for details."
          if [ -f sbom.cdx.json ]; then
            gh release create "v$VERSION" --title "v$VERSION" --notes "$NOTES" sbom.cdx.json
          else
            gh release create "v$VERSION" --title "v$VERSION" --notes "$NOTES"
          fi
